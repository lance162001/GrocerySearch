<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GrocerySearch Admin</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 1rem; }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--accent); }
  h2 { font-size: 1.1rem; margin-bottom: .5rem; color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
  .card .label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .card .value { font-size: 1.8rem; font-weight: 600; margin-top: .25rem; }
  .status-ok { color: var(--green); }
  .status-warn { color: var(--yellow); }
  .status-err { color: var(--red); }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th, td { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: var(--card); }
  tr:hover td { background: rgba(88,166,255,.05); }
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; overflow-x: auto; }
  .tabs { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { padding: .4rem .8rem; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: .85rem; }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .search-box { width: 100%; padding: .5rem .75rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: .75rem; font-size: .85rem; }
  .search-box:focus { outline: none; border-color: var(--accent); }
  .pager { display: flex; gap: .5rem; align-items: center; margin-top: .75rem; justify-content: center; }
  .pager button { padding: .3rem .7rem; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; }
  .pager button:disabled { opacity: .4; cursor: default; }
  .pager span { font-size: .85rem; color: var(--muted); }
  .badge { display: inline-block; padding: .15rem .5rem; border-radius: 10px; font-size: .75rem; font-weight: 600; }
  .badge-green { background: rgba(63,185,80,.15); color: var(--green); }
  .badge-red { background: rgba(248,81,73,.15); color: var(--red); }
  .badge-yellow { background: rgba(210,153,34,.15); color: var(--yellow); }
  .mono { font-family: "SF Mono", "Fira Code", monospace; font-size: .8rem; }
  #sql-input { width: 100%; min-height: 60px; padding: .5rem .75rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: "SF Mono", "Fira Code", monospace; font-size: .85rem; resize: vertical; }
  #sql-input:focus { outline: none; border-color: var(--accent); }
  .run-btn { padding: .4rem 1rem; border-radius: 6px; border: none; background: var(--accent); color: #000; font-weight: 600; cursor: pointer; margin-top: .5rem; }
  .run-btn:hover { opacity: .9; }
  .hint { font-size: .75rem; color: var(--muted); margin-top: .25rem; }
  .err-msg { color: var(--red); font-size: .85rem; margin-top: .5rem; }
  .updated { font-size: .75rem; color: var(--muted); text-align: right; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .res-bar-wrap { background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; margin-top: .35rem; }
  .res-bar { height: 100%; border-radius: 4px; transition: width .4s ease; }
  .res-bar-ok { background: var(--green); }
  .res-bar-warn { background: var(--yellow); }
  .res-bar-err { background: var(--red); }
  .sys-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: .75rem; }
  .sys-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: .6rem .85rem; }
  .sys-card .sc-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .sys-card .sc-value { font-size: 1.15rem; font-weight: 600; margin-top: .1rem; }
  .sys-card .sc-sub { font-size: .75rem; color: var(--muted); margin-top: .1rem; }
  .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: .4rem; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>

<h1>GrocerySearch Admin Dashboard</h1>

<!-- Status cards -->
<div class="grid" id="status-cards">
  <div class="card"><div class="label">Loading…</div><div class="value">—</div></div>
</div>

<!-- Scraper status -->
<div class="section" id="scraper-section">
  <h2>Scraper Status</h2>
  <div id="scraper-info">Loading…</div>
</div>

<!-- System resources -->
<div class="section">
  <h2><span class="pulse"></span>System Resources <span style="font-size:.75rem;font-weight:400;color:var(--muted);">live · updates every 5s</span></h2>
  <div class="sys-grid" id="sys-resources">Loading…</div>
</div>

<!-- DB explorer tabs -->
<div class="section">
  <h2>Database Explorer</h2>
  <div class="tabs" id="table-tabs"></div>
  <input class="search-box" id="table-search" placeholder="Filter rows…" oninput="filterRows()">
  <div id="table-view">Select a table above.</div>
  <div class="pager" id="pager" style="display:none">
    <button id="prev-btn" onclick="changePage(-1)">← Prev</button>
    <span id="page-info"></span>
    <button id="next-btn" onclick="changePage(1)">Next →</button>
  </div>
</div>

<!-- SQL console -->
<div class="section">
  <h2>SQL Console <span class="badge badge-yellow">read-only</span></h2>
  <textarea id="sql-input" placeholder="SELECT * FROM products LIMIT 10"></textarea>
  <button class="run-btn" onclick="runSQL()">Run Query</button>
  <p class="hint">Only SELECT statements are allowed. Press Ctrl+Enter to run.</p>
  <div id="sql-error" class="err-msg"></div>
  <div id="sql-result" style="margin-top:.75rem; overflow-x:auto;"></div>
</div>

<p class="updated" id="last-updated"></p>

<script>
const API = location.origin;
let currentTable = null;
let currentPage = 1;
const PAGE_SIZE = 50;
let allRows = [];
let filteredRows = [];

async function fetchJSON(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadDashboard() {
  try {
    const data = await fetchJSON('/admin/status');
    renderStatus(data);
    renderScraper(data.scraper);
    renderTabs(data.tables);
    document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('status-cards').innerHTML = '<div class="card"><div class="label">Error</div><div class="value status-err">' + e.message + '</div></div>';
  }
}

function renderStatus(data) {
  const db = data.db;
  let html = '';
  html += card('Database', db.type, 'status-ok');
  html += card('DB Size', db.size_display, '');
  for (const [name, count] of Object.entries(db.table_counts)) {
    html += card(name, count.toLocaleString(), '');
  }
  document.getElementById('status-cards').innerHTML = html;
}

function card(label, value, cls) {
  return '<div class="card"><div class="label">' + esc(label) + '</div><div class="value ' + cls + '">' + esc(String(value)) + '</div></div>';
}

function renderScraper(sc) {
  if (!sc) { document.getElementById('scraper-info').textContent = 'No scraper info.'; return; }

  const status = sc.status || 'unknown';
  const statusClass = status === 'idle' ? 'badge-green' : status === 'running' ? 'badge-yellow' : status === 'error' ? 'badge-red' : '';

  let html = '<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">';
  html += '<span class="badge ' + statusClass + '" style="font-size:.95rem;padding:.3rem .9rem;">' + esc(status.toUpperCase()) + '</span>';
  if (sc.updated_at) html += '<span style="color:var(--muted);font-size:.85rem">Last updated: ' + fmtDate(sc.updated_at) + '</span>';
  html += '</div>';

  if (sc.error) {
    html += '<div style="background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:6px;padding:.75rem;margin-bottom:1rem;color:var(--red);word-break:break-word;">';
    html += '<strong style="display:block;margin-bottom:.25rem;">Error</strong><span class="mono">' + esc(sc.error) + '</span>';
    html += '</div>';
  }

  const timingFields = ['started_at', 'last_finished'];
  const timingLabels = { started_at: 'Started', last_finished: 'Last Finished' };
  const timingItems = timingFields.filter(f => sc[f]);
  if (timingItems.length) {
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.75rem;margin-bottom:1rem;">';
    for (const f of timingItems) html += scraperCard(timingLabels[f], fmtDate(sc[f]));
    html += '</div>';
  }

  const countFields = ['companies_scraped', 'stores_scraped', 'new_products', 'new_instances', 'new_price_points', 'updated_price_points'];
  const countLabels = { companies_scraped: 'Companies Scraped', stores_scraped: 'Stores Scraped', new_products: 'New Products', new_instances: 'New Instances', new_price_points: 'New Price Points', updated_price_points: 'Updated Same-Day Prices' };
  const countItems = countFields.filter(f => sc[f] != null);
  if (countItems.length) {
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem;">';
    for (const f of countItems) html += scraperCard(countLabels[f], sc[f].toLocaleString());
    html += '</div>';
  }

  document.getElementById('scraper-info').innerHTML = html;
}

function scraperCard(label, value) {
  return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.5rem .75rem;">'
    + '<div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;">' + esc(label) + '</div>'
    + '<div style="font-size:1.2rem;font-weight:600;margin-top:.15rem;">' + esc(String(value)) + '</div>'
    + '</div>';
}

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleString(); } catch { return iso; }
}

function renderTabs(tables) {
  const container = document.getElementById('table-tabs');
  container.innerHTML = tables.map(t =>
    '<button class="tab" data-t="' + esc(t) + '" onclick="loadTable(\'' + esc(t) + '\')">' + esc(t) + '</button>'
  ).join('');
}

async function loadTable(name) {
  currentTable = name;
  currentPage = 1;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.t === name));
  document.getElementById('table-view').innerHTML = 'Loading…';
  document.getElementById('table-search').value = '';
  try {
    const data = await fetchJSON('/admin/table/' + encodeURIComponent(name) + '?limit=2000');
    allRows = data.rows;
    filteredRows = allRows;
    renderTable(data.columns);
  } catch (e) {
    document.getElementById('table-view').innerHTML = '<span class="status-err">' + esc(e.message) + '</span>';
  }
}

function renderTable(columns) {
  if (!columns || columns.length === 0) { document.getElementById('table-view').innerHTML = 'Empty table.'; document.getElementById('pager').style.display='none'; return; }
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRows = filteredRows.slice(start, start + PAGE_SIZE);
  const totalPages = Math.ceil(filteredRows.length / PAGE_SIZE) || 1;

  let html = '<table><tr>' + columns.map(c => '<th>' + esc(c) + '</th>').join('') + '</tr>';
  for (const row of pageRows) {
    html += '<tr>' + columns.map(c => '<td class="mono">' + esc(String(row[c] ?? '')) + '</td>').join('') + '</tr>';
  }
  html += '</table>';
  document.getElementById('table-view').innerHTML = html;

  const pager = document.getElementById('pager');
  pager.style.display = totalPages > 1 ? 'flex' : 'none';
  document.getElementById('page-info').textContent = 'Page ' + currentPage + ' / ' + totalPages + ' (' + filteredRows.length + ' rows)';
  document.getElementById('prev-btn').disabled = currentPage <= 1;
  document.getElementById('next-btn').disabled = currentPage >= totalPages;
  // remember columns for re-render
  pager.dataset.cols = JSON.stringify(columns);
}

function changePage(delta) {
  currentPage += delta;
  renderTable(JSON.parse(document.getElementById('pager').dataset.cols));
}

function filterRows() {
  const q = document.getElementById('table-search').value.toLowerCase();
  if (!q) { filteredRows = allRows; } else {
    filteredRows = allRows.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(q)));
  }
  currentPage = 1;
  if (allRows.length > 0) renderTable(Object.keys(allRows[0]));
}

async function runSQL() {
  const sql = document.getElementById('sql-input').value.trim();
  if (!sql) return;
  document.getElementById('sql-error').textContent = '';
  document.getElementById('sql-result').innerHTML = 'Running…';
  try {
    const r = await fetch(API + '/admin/sql', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({sql})
    });
    const data = await r.json();
    if (!r.ok) { document.getElementById('sql-error').textContent = data.detail || 'Error'; document.getElementById('sql-result').innerHTML = ''; return; }
    if (!data.columns.length) { document.getElementById('sql-result').innerHTML = '<span class="mono">Query returned no columns.</span>'; return; }
    let html = '<table><tr>' + data.columns.map(c => '<th>' + esc(c) + '</th>').join('') + '</tr>';
    for (const row of data.rows) {
      html += '<tr>' + data.columns.map(c => '<td class="mono">' + esc(String(row[c] ?? '')) + '</td>').join('') + '</tr>';
    }
    html += '</table><p class="hint">' + data.rows.length + ' rows returned</p>';
    document.getElementById('sql-result').innerHTML = html;
  } catch (e) {
    document.getElementById('sql-error').textContent = e.message;
    document.getElementById('sql-result').innerHTML = '';
  }
}

document.getElementById('sql-input').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runSQL(); }
});

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function barColor(pct) {
  return pct >= 90 ? 'res-bar-err' : pct >= 70 ? 'res-bar-warn' : 'res-bar-ok';
}
function resBar(pct) {
  const cls = barColor(pct);
  return `<div class="res-bar-wrap"><div class="res-bar ${cls}" style="width:${pct}%"></div></div>`;
}
function sysCard(label, value, sub, barPct) {
  const bar = barPct != null ? resBar(barPct) : '';
  return `<div class="sys-card"><div class="sc-label">${esc(label)}</div>`
    + `<div class="sc-value">${esc(String(value))}</div>`
    + (sub ? `<div class="sc-sub">${esc(sub)}</div>` : '')
    + bar + '</div>';
}

async function loadSystemStats() {
  try {
    const s = await fetchJSON('/admin/system');
    let html = '';
    html += sysCard('CPU', s.cpu.percent.toFixed(1) + '%', `${s.cpu.cores} cores / ${s.cpu.logical_cores} logical`, s.cpu.percent);
    html += sysCard('Memory', s.memory.percent.toFixed(1) + '%', `${s.memory.used_mb.toLocaleString()} / ${s.memory.total_mb.toLocaleString()} MB used`, s.memory.percent);
    html += sysCard('Disk', s.disk.percent.toFixed(1) + '%', `${s.disk.used_gb} / ${s.disk.total_gb} GB used`, s.disk.percent);
    html += sysCard('API Process RSS', s.process.rss_mb.toFixed(1) + ' MB', `PID ${s.process.pid} · ${s.process.threads} threads`, null);
    html += sysCard('API Process CPU', s.process.cpu_percent.toFixed(1) + '%', `${s.process.open_connections} open connections`, s.process.cpu_percent);
    html += sysCard('Network (cumulative)', `↑ ${s.network.bytes_sent_mb} MB`, `↓ ${s.network.bytes_recv_mb} MB recv`, null);
    document.getElementById('sys-resources').innerHTML = html;
  } catch (e) {
    document.getElementById('sys-resources').innerHTML = '<span class="status-err">Failed to load system stats: ' + esc(e.message) + '</span>';
  }
}

loadDashboard();
loadSystemStats();
setInterval(loadSystemStats, 5000);
</script>
</body>
</html>
