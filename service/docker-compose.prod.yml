name: grocerysearch

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grocerysearch}
      POSTGRES_USER: ${POSTGRES_USER:-grocerysearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grocerysearch} -d ${POSTGRES_DB:-grocerysearch}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "autoheal=true"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-grocerysearch}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-grocerysearch}}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://yourdomain.com}
      BASE_URL: ${BASE_URL:-https://yourdomain.com}
      DISABLE_DOCS: ${DISABLE_DOCS:-1}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      UVICORN_PORT: 8000
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - static_data:/app/static

  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=15
      - AUTOHEAL_START_PERIOD=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ../app
      dockerfile: Dockerfile.web
      args:
        USE_LOCAL_BACKEND: ${FRONTEND_USE_LOCAL_BACKEND:-true}
        LOCAL_BACKEND_HOST: ${LOCAL_BACKEND_HOST:-}
        LOCAL_BACKEND_PORT: ${LOCAL_BACKEND_PORT:-8000}
        WEB_USE_SAME_ORIGIN_API: ${FRONTEND_WEB_USE_SAME_ORIGIN_API:-true}
        WEB_API_PATH_PREFIX: ${FRONTEND_WEB_API_PATH_PREFIX:-/api}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-grocerysearch}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-grocerysearch}}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      ALGOLIA_APP_ID: ${ALGOLIA_APP_ID:-QGPPR19V8V}
      ALGOLIA_API_KEY: ${ALGOLIA_API_KEY:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_RECEIVER: ${EMAIL_RECEIVER:-}
      BASE_URL: ${BASE_URL:-https://yourdomain.com}
    command: ["python", "scraper.py", "--run-on-start"]
    volumes:
      - static_data:/app/static

  scraper_once:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["jobs"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-grocerysearch}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-grocerysearch}}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      ALGOLIA_APP_ID: ${ALGOLIA_APP_ID:-QGPPR19V8V}
      ALGOLIA_API_KEY: ${ALGOLIA_API_KEY:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_RECEIVER: ${EMAIL_RECEIVER:-}
      BASE_URL: ${BASE_URL:-https://yourdomain.com}
    command: ["python", "scraper.py", "--run-once"]
    volumes:
      - static_data:/app/static

  logo_refresh:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["jobs"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-grocerysearch}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-grocerysearch}}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
    command: ["python", "logo_downloader.py"]
    volumes:
      - static_data:/app/static

volumes:
  postgres_data:
  static_data:
