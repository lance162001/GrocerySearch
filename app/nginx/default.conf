server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Use Docker's internal DNS resolver so Nginx re-resolves the upstream
  # hostname on each request instead of caching the IP at startup.
  # This prevents stale IPs when the api container restarts and Docker
  # reassigns its address to another container (e.g. scraper).
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Proxy API calls from the web client to the internal Docker api service.
  location /api/ {
    set $backend http://api:8000;
    proxy_pass $backend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
